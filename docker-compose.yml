services:
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://auth-db:5432/auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: sanosysalvos-secret-key-para-jwt-desarrollo-2026
    depends_on:
      auth-db:
        condition: service_healthy
    restart: on-failure

  auth-db:
    image: postgres:15
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
