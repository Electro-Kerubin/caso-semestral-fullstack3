services:
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:postgresql://auth-db:5432/auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: secretlocal
    depends_on:
      - auth-db

  auth-db:
    image: postgres:15
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"